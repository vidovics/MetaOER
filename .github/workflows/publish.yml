name: Publish Quarto Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      R_LIBS_USER: /home/runner/work/_temp/Library   # ✅ ensure consistent library

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Install R
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # ✅ Install required packages using correct library
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c("rmarkdown","knitr","here"), repos="https://cloud.r-project.org")'

      # ✅ Tell Quarto where R libraries are
      - name: Set R library path
        run: |
          echo "R_LIBS_USER=/home/runner/work/_temp/Library" >> $GITHUB_ENV

      # ✅ Install Quarto
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # ✅ Render site
      - name: Render site
        uses: quarto-dev/quarto-actions/render@v2

      # ✅ Deploy
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
